#
# Rust checks align with what teams typically run locally and in review:
#   cargo fmt --check, cargo clippy, cargo test
# Docker image is built on every run; published to GHCR on push to the default
# branch(es) and on v* version tags. For releases, the primary tags are the **git
# tag** (e.g. ghcr.io/.../...:v1.0.0), with semver/latest/sha as extra aliases — not
# the Cargo package version in isolation. ELASTIC_MCP_VERSION matches the ref name
# (including the v) on tag builds.
#
# GHCR: grant "read/write" for packages in repo Actions settings if the job fails
# to push (rare; default GITHUB_TOKEN is usually enough for same-repo pushes).

name: CI

"on":
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: Format, clippy, and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: cargo test
        run: cargo test --locked

  docker:
    name: Build Docker image
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set GHCR image name (must be lower case)
        id: image
        run: |
          name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          # Tag releases: the **git ref name** (e.g. v1.0.0) is listed first, then
          # SemVer aliases (1.0.0, 1.0) so the image matches the tag, not only bare package semver.
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=ref,event=branch
            type=ref,event=pr
          flavor: |
            latest=auto

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          # Pin OCI `version` to the git ref (e.g. v1.0.0 on a tag), not only semver from metadata
          # (which is often 1.0.0 without the v prefix and can diverge from the release tag).
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ format('https://github.com/{0}', github.repository) }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || format('0.0.0+sha.{0}', github.sha) }}
          # GHA cache can 504 on large mode=max exports; min + ignore-error keeps CI green.
          cache-from: type=gha
          cache-to: type=gha,mode=min,ignore-error=true
