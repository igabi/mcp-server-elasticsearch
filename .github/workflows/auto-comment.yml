# Uses the default GITHUB_TOKEN. Comments use the issues API; PRs require
# pull-requests: write in addition to issues: write, or the API returns 403
# (Resource not accessible by integration).
#
# If 403 persists: Repo Settings > Actions > General > "Workflow permissions":
#   enable "Read and write permissions" (or allow the workflow to request
#   permissions required by the job).

name: Add comment
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  add-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Add comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const commentBody = "**Deprecation warning:** This MCP server is deprecated and will only receive critical security updates going forward. It has been superseded by [Elastic Agent Builder](https://ela.st/agent-builder-docs)'s [MCP endpoint](https://ela.st/agent-builder-mcp), which is available in Elastic 9.2.0+ and Elasticsearch Serverless projects.";

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.payload.issue?.number ?? context.payload.pull_request?.number,
              body: commentBody
            });
